<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chat — Appointbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ab-bg: #f1f5f9;
      --ab-surface: #ffffff;
      --ab-text: #0f172a;
      --ab-muted: #64748b;
      --ab-accent: #0d9488;
      --ab-accent-dark: #0f766e;
      --ab-user: #ecfdf5;
      --ab-user-border: #99f6e4;
      --ab-bot: #ffffff;
      --ab-header: linear-gradient(135deg, #0f766e 0%, #115e59 48%, #134e4a 100%);
      --ab-radius: 18px;
      --ab-radius-sm: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html.embed, html.embed body {
      height: 100%;
      overflow: hidden;
    }

    body.embed {
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--ab-bg);
      color: var(--ab-text);
      -webkit-font-smoothing: antialiased;
    }

    /* Standalone: full-page demo frame */
    body:not(.embed) {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(13, 148, 136, 0.12), transparent 55%),
        radial-gradient(900px 500px at 100% 100%, rgba(15, 118, 110, 0.1), transparent 50%),
        #f8fafc;
    }

    body:not(.embed) .shell {
      width: min(420px, 100%);
      height: min(720px, calc(100vh - 48px));
      height: min(720px, calc(100dvh - 48px));
      border-radius: 24px;
      box-shadow:
        0 32px 64px rgba(15, 23, 42, 0.12),
        0 0 0 1px rgba(15, 23, 42, 0.06);
    }

    /* Embed: fill parent iframe */
    body.embed .shell {
      width: 100%;
      height: 100%;
      min-height: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .shell {
      display: flex;
      flex-direction: column;
      background: var(--ab-surface);
      overflow: hidden;
      min-height: 0;
    }

    /* Header */
    .header {
      flex-shrink: 0;
      background: var(--ab-header);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 40%);
      pointer-events: none;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      z-index: 1;
    }

    .header-text { flex: 1; min-width: 0; z-index: 1; }
    .header-name {
      font-family: "Outfit", sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .header-sub {
      font-size: 12px;
      opacity: 0.88;
      margin-top: 2px;
      font-weight: 500;
    }
    .header-badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(255,255,255,0.18);
      padding: 3px 8px;
      border-radius: 999px;
      margin-top: 6px;
      display: inline-block;
    }

    .reset-btn {
      z-index: 1;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 7px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      transition: background 0.15s;
    }
    .reset-btn:hover { background: rgba(255,255,255,0.24); }

    /* Messages */
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background:
        linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.35);
      border-radius: 4px;
    }

    .bubble-wrap { display: flex; }
    .bubble-wrap.bot  { justify-content: flex-start; }
    .bubble-wrap.user { justify-content: flex-end; }

    .bubble {
      max-width: 88%;
      padding: 11px 14px;
      border-radius: var(--ab-radius-sm);
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .bubble.bot {
      background: var(--ab-bot);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      background: var(--ab-user);
      border: 1px solid var(--ab-user-border);
      border-bottom-right-radius: 4px;
    }

    .bubble time {
      display: block;
      font-size: 10px;
      color: var(--ab-muted);
      text-align: right;
      margin-top: 6px;
      font-weight: 500;
    }

    .bubble b  { font-weight: 700; }
    .bubble i  { font-style: italic; }
    .bubble s  { text-decoration: line-through; }
    .bubble code {
      font-family: ui-monospace, monospace;
      background: rgba(15, 23, 42, 0.06);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: var(--ab-bot);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: var(--ab-radius-sm);
      border-bottom-left-radius: 4px;
      width: fit-content;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .typing span {
      width: 7px;
      height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: ab-pulse 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes ab-pulse {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.85; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Quick chips */
    .quick-cmds {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      overflow-x: auto;
      background: #e2e8f0;
      border-top: 1px solid rgba(148, 163, 184, 0.35);
      scrollbar-width: none;
    }
    .quick-cmds::-webkit-scrollbar { display: none; }

    .cmd-btn {
      white-space: nowrap;
      background: #fff;
      border: 1px solid rgba(148, 163, 184, 0.45);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      color: var(--ab-text);
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .cmd-btn:hover {
      border-color: var(--ab-accent);
      background: #f0fdfa;
      color: var(--ab-accent-dark);
    }

    /* Composer */
    .input-area {
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 14px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: #fff;
      border-top: 1px solid rgba(226, 232, 240, 0.95);
    }

    .input-wrap {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 10px 16px;
      display: flex;
      align-items: flex-end;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-wrap:focus-within {
      border-color: var(--ab-accent);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
    }

    textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-size: 15px;
      font-family: inherit;
      max-height: 100px;
      line-height: 1.45;
      background: transparent;
      color: var(--ab-text);
    }
    textarea::placeholder { color: #94a3b8; }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(145deg, #0d9488, #0f766e);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.12s, filter 0.12s;
      box-shadow: 0 4px 14px rgba(13, 148, 136, 0.35);
    }
    .send-btn:hover { filter: brightness(1.05); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn svg { fill: #fff; width: 20px; height: 20px; }

    .footer-note {
      flex-shrink: 0;
      text-align: center;
      font-size: 10px;
      color: #94a3b8;
      padding: 6px 12px 10px;
      background: #fff;
      border-top: 1px solid rgba(241, 245, 249, 0.9);
    }
    .footer-note a { color: var(--ab-accent); text-decoration: none; font-weight: 600; }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="avatar" id="headerAvatar" aria-hidden="true">✦</div>
    <div class="header-text">
      <div class="header-name" id="bizName">Appointbot</div>
      <div class="header-sub">AI Booking Assistant</div>
      <span class="header-badge">Replies instantly</span>
    </div>
    <button type="button" class="reset-btn" onclick="resetChat()">Reset</button>
  </header>

  <div class="messages" id="messages" role="log" aria-live="polite" aria-relevant="additions"></div>

  <div class="quick-cmds" aria-label="Quick actions">
    <button type="button" class="cmd-btn" onclick="sendQuick('HELP')">Help</button>
    <button type="button" class="cmd-btn" onclick="sendQuick('Book haircut tomorrow at 5pm')">Book</button>
    <button type="button" class="cmd-btn" onclick="sendQuick('My appointments')">My bookings</button>
    <button type="button" class="cmd-btn" onclick="sendQuick('Cancel my appointment')">Cancel</button>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="Type a message…" aria-label="Message" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button type="button" class="send-btn" onclick="sendMessage()" aria-label="Send message">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="footer-note embed-footer embed-only">
    Powered by <a href="https://appointbot.com" target="_blank" rel="noopener noreferrer">Appointbot</a>
  </div>
</div>

<script>
  (function () {
    var qs = new URLSearchParams(location.search);
    if (qs.get('embed') === '1') {
      document.documentElement.classList.add('embed');
      document.body.classList.add('embed');
      var footers = document.querySelectorAll('.embed-only');
      for (var i = 0; i < footers.length; i++) footers[i].style.display = 'block';
    }
  })();

  var messagesEl = document.getElementById('messages');
  var input = document.getElementById('msgInput');

  var preset = typeof window.__APPOINTBOT__ === 'object' && window.__APPOINTBOT__ ? window.__APPOINTBOT__ : {};
  var bizLabel = preset.name || 'Appointbot';

  var slug = location.pathname.split('/').filter(Boolean)[1] || '';
  var qs = new URLSearchParams(location.search);
  var leadSource = qs.get('source') || 'chat_page';
  var campaign = qs.get('campaign') || '';
  var utmSource = qs.get('utm_source') || '';
  var SEND_URL = slug ? '/chat/' + encodeURIComponent(slug) + '/send' : '/chat/send';
  var RESET_URL = slug ? '/chat/' + encodeURIComponent(slug) + '/reset' : '/chat/reset';

  function applyBranding() {
    document.getElementById('bizName').textContent = bizLabel;
    document.title = 'Chat — ' + bizLabel;
    var av = document.getElementById('headerAvatar');
    var letter = (bizLabel || 'A').trim().charAt(0).toUpperCase();
    av.textContent = letter;
  }

  function now() {
    return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  }

  function formatText(text) {
    return String(text)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*([^*]+)\*/g, '<b>$1</b>')
      .replace(/_([^_]+)_/g, '<i>$1</i>')
      .replace(/~([^~]+)~/g, '<s>$1</s>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  function addBubble(text, type) {
    var wrap = document.createElement('div');
    wrap.className = 'bubble-wrap ' + type;
    wrap.innerHTML = '<div class="bubble ' + type + '"><span>' + formatText(text) + '</span><time>' + now() + '</time></div>';
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    var el = document.createElement('div');
    el.className = 'bubble-wrap bot';
    el.id = 'typing';
    el.innerHTML = '<div class="bubble bot typing"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function removeTyping() {
    var t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    autoResize(input);

    addBubble(text, 'user');
    var typingEl = showTyping();

    try {
      var res = await fetch(SEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          source: leadSource,
          campaign: campaign,
          utmSource: utmSource,
        }),
      });
      var raw = await res.text();
      var data;
      try {
        data = JSON.parse(raw);
      } catch (parseErr) {
        removeTyping();
        addBubble('Could not reach the assistant. Please try again in a moment.', 'bot');
        return;
      }
      removeTyping();
      if (data.businessName) {
        bizLabel = data.businessName;
        document.getElementById('bizName').textContent = data.businessName;
      }
      addBubble(data.reply || '(no reply)', 'bot');
    } catch (err) {
      removeTyping();
      addBubble('Could not reach the assistant. Please try again in a moment.', 'bot');
    }
  }

  function sendQuick(text) {
    input.value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  async function resetChat() {
    await fetch(RESET_URL, { method: 'DELETE' });
    messagesEl.innerHTML = '';
    addBubble('Session reset. Say *HELP* anytime, or ask to book an appointment.', 'bot');
  }

  window.addEventListener('load', function () {
    applyBranding();
    var greet = '👋 Hi! I\'m your assistant at *' + bizLabel + '*.\n\nAsk *HELP* for options, or say something like _"Book a haircut tomorrow at 5pm"_.';
    addBubble(greet, 'bot');
    input.focus();
  });
</script>
<style>
  .embed-only { display: none; }
  html.embed .embed-only { display: block; }
</style>
</body>
</html>
