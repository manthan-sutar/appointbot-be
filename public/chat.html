<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>appointbot — Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e5ddd5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: #fff;
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
    }

    /* Header */
    .header {
      background: #075e54;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .avatar {
      width: 40px; height: 40px;
      background: #25d366;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-info { flex: 1; }
    .header-name { font-weight: 600; font-size: 16px; }
    .header-status { font-size: 12px; opacity: 0.8; }
    .reset-btn {
      background: rgba(255,255,255,0.15);
      border: none; color: #fff;
      padding: 6px 12px; border-radius: 20px;
      cursor: pointer; font-size: 12px;
    }
    .reset-btn:hover { background: rgba(255,255,255,0.25); }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #e5ddd5 url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c5b8ae' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .bubble-wrap { display: flex; }
    .bubble-wrap.bot  { justify-content: flex-start; }
    .bubble-wrap.user { justify-content: flex-end; }

    .bubble {
      max-width: 78%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      position: relative;
      word-break: break-word;
    }
    .bubble.bot  { background: #fff;    border-top-left-radius: 2px; }
    .bubble.user { background: #dcf8c6; border-top-right-radius: 2px; }

    .bubble time {
      display: block;
      font-size: 11px;
      color: #999;
      text-align: right;
      margin-top: 4px;
    }

    /* WhatsApp text formatting */
    .bubble b  { font-weight: 700; }
    .bubble i  { font-style: italic; }
    .bubble s  { text-decoration: line-through; }
    .bubble code { font-family: monospace; background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 3px; }

    /* Typing indicator */
    .typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; }
    .typing span {
      width: 8px; height: 8px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* Quick commands */
    .quick-cmds {
      display: flex;
      gap: 6px;
      padding: 6px 10px;
      overflow-x: auto;
      background: #f0f0f0;
      flex-shrink: 0;
    }
    .quick-cmds::-webkit-scrollbar { display: none; }
    .cmd-btn {
      white-space: nowrap;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .cmd-btn:hover { background: #e8f5e9; border-color: #25d366; }

    /* Input area */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 10px;
      background: #f0f0f0;
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1;
      background: #fff;
      border-radius: 24px;
      padding: 8px 14px;
      display: flex;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-size: 15px;
      font-family: inherit;
      max-height: 120px;
      line-height: 1.4;
      background: transparent;
    }
    .send-btn {
      width: 44px; height: 44px;
      background: #25d366;
      border: none; border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #1da851; }
    .send-btn svg { fill: #fff; width: 22px; height: 22px; }
  </style>
</head>
<body>
<div class="phone">
  <!-- Header -->
  <div class="header">
    <div class="avatar">📅</div>
    <div class="header-info">
      <div class="header-name" id="bizName">appointbot</div>
      <div class="header-status">AI Booking Assistant</div>
    </div>
    <button class="reset-btn" onclick="resetChat()">Reset</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Quick commands -->
  <div class="quick-cmds">
    <button class="cmd-btn" onclick="sendQuick('HELP')">HELP</button>
    <button class="cmd-btn" onclick="sendQuick('Book haircut tomorrow at 5pm')">Book Haircut</button>
    <button class="cmd-btn" onclick="sendQuick('My appointments')">My Bookings</button>
    <button class="cmd-btn" onclick="sendQuick('Cancel my appointment')">Cancel</button>
    <button class="cmd-btn" onclick="sendQuick('YES')">YES</button>
    <button class="cmd-btn" onclick="sendQuick('NO')">NO</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msgInput" rows="1" placeholder="Message" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const input      = document.getElementById('msgInput');

  // Derive slug from URL path: /chat/:slug
  const slug = location.pathname.split('/').filter(Boolean)[1] || '';
  const qs = new URLSearchParams(location.search);
  const leadSource = qs.get('source') || 'chat_page';
  const campaign = qs.get('campaign') || '';
  const utmSource = qs.get('utm_source') || '';
  const SEND_URL  = slug ? `/chat/${slug}/send`  : '/chat/send';
  const RESET_URL = slug ? `/chat/${slug}/reset` : '/chat/reset';

  function now() {
    return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  }

  function formatText(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*([^*]+)\*/g, '<b>$1</b>')
      .replace(/_([^_]+)_/g, '<i>$1</i>')
      .replace(/~([^~]+)~/g, '<s>$1</s>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  function addBubble(text, type) {
    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${type}`;
    wrap.innerHTML = `<div class="bubble ${type}"><span>${formatText(text)}</span><time>${now()}</time></div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'bubble-wrap bot';
    el.id = 'typing';
    el.innerHTML = '<div class="bubble bot typing"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    autoResize(input);

    addBubble(text, 'user');
    const typingEl = showTyping();

    try {
      const res = await fetch(SEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          source: leadSource,
          campaign,
          utmSource,
        }),
      });
      const data = await res.json();
      removeTyping();
      if (data.businessName) document.getElementById('bizName').textContent = data.businessName;
      addBubble(data.reply || '(no reply)', 'bot');
    } catch (err) {
      removeTyping();
      addBubble('Error: Could not reach the bot.', 'bot');
    }
  }

  function sendQuick(text) {
    input.value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  async function resetChat() {
    await fetch(RESET_URL, { method: 'DELETE' });
    messagesEl.innerHTML = '';
    addBubble('Session reset. Say *HELP* to start!', 'bot');
  }

  // Greeting on load
  window.addEventListener('load', () => {
    addBubble('👋 Welcome to *appointbot*!\n\nSay *HELP* to see what I can do, or try:\n_"Book a haircut tomorrow at 5pm"_', 'bot');
    input.focus();
  });
</script>
</body>
</html>
